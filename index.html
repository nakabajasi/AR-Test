<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Model Viewer</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      font-family: sans-serif;
    }

    model-viewer {
      width: 100%;
      height: 100vh;
      background-color: #111;
    }

    .note {
      position: fixed;
      left: 12px;
      bottom: 12px;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>

<body>

  <model-viewer
    src="./model.glb"
    ios-src="./model.usdz"
    alt="3D model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">
  </model-viewer>

  <div class="note">
    AndroidはGLB、iPhone/iPadはUSDZでAR表示します。
  </div>

</body>
</html>
